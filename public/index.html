<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Threads Stars</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/css/style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="app" class="app-loading">
        <div id="globe-background" style="position: fixed; inset: 0; z-index: 0; background: #000;">
            <div id="globe-container" style="width: 100%; height: 100%;"></div>
        </div>

        <div id="main-app-content">
            <div id="map-tab" class="tab-content active" style="padding: 0; position: relative; height: 100vh; overflow: hidden; background: transparent;">
                <div class="map-overlay-top"><div class="clay-badge"><span id="active-users-count">...</span> Online</div></div>
                <div class="map-overlay-bottom"><div class="location-status glass-panel" id="focus-my-location"><span id="location-text">Detecting location...</span></div></div>
            </div>

            <div id="nearby-tab" class="tab-content">
                <h2 class="page-title" data-i18n="nearby_title">People Nearby</h2>
                <div id="nearby-list" class="clay-list"><div class="loading-state">Finding people around you...</div></div>
            </div>

            <div id="profile-tab" class="tab-content">
                <h2 class="page-title" data-i18n="profile_title">Profile</h2>
                <div class="clay-card">
                    <div id="user-name" style="font-size: 24px; font-weight: 800;">User</div>
                </div>
            </div>
        </div>

        <nav class="clay-nav">
            <div class="nav-item active" data-tab="map"><span data-i18n="nav_map">Map</span></div>
            <div class="nav-item" data-tab="nearby"><span data-i18n="nav_nearby">Nearby</span></div>
            <div class="nav-item" data-tab="profile"><span data-i18n="nav_profile">Profile</span></div>
        </nav>

        <!-- Functional modals restored -->
        <div id="settings-page" class="clay-modal-page"></div>
        <div id="verify-modal" class="modal"></div>
        <div id="maintenance-stub" class="mode-stub hidden"></div>
        <div id="verification-stub" class="mode-stub hidden"></div>
        <div id="blocked-stub" class="mode-stub hidden"></div>
        <div id="loading" class="loading"></div>
        <div id="splash-screen" class="splash-screen"></div>
    </div>

    <script src="/js/telegram.js"></script>
    <script src="/js/i18n.js"></script>
    <script src="/js/glare.js"></script>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
